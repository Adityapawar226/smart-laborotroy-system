<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Billing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid px-4 py-4">

<h2>Billing Management</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Receipt No</th>
<th>Patient ID</th>
<th>Patient Name</th>
<th>Amount</th>
<th>Payment Mode</th>
<th>Payment Status</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for bill in bills %}

<tr>

<td>{{ bill[0] }}</td>

<td>{{ bill[1] }}</td>

<td>{{ bill[2] }}</td>

<td>₹{{ bill[3] }}</td>

<td>{{ bill[4] }}</td>

<td>

{% if bill[5]=='Paid' %}

<span class="badge bg-success">
Paid
</span>

{% else %}

<span class="badge bg-danger">
Pending
</span>

{% endif %}

</td>

<td>{{ bill[6] }}</td>

<td>

<a href="/view-bill/{{ bill[1] }}"
class="btn btn-primary btn-sm">

View

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
