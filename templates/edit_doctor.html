<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Edit Doctor</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3 class="mb-0">
                Edit Doctor
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        Doctor Name

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="doctor_name"
                        value="{{ doctor.doctor_name }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Commission %

                    </label>

                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        name="commission_percent"
                        value="{{ doctor.commission_percent }}"
                        required>

                </div>

                <button
                    class="btn btn-success">

                    Save Changes

                </button>

                <a
                    href="{{ url_for('expenses') }}"
                    class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
