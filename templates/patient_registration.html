<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration | Smart Laboratory</title>
     <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/patient_registration.css') }}">
          
</head>

<body>

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="page-header mb-4">

        <h2>Patient Registration</h2>

        <p class="text-muted">
            Smart Laboratory Management System
        </p>

    </div>

    <!-- Patient Information -->

    <div class="card shadow-sm mb-4">

        <div class="card-header">

            <h5 class="mb-0">Patient Information</h5>

        </div>

        <div class="card-body">

           

               <form method="POST" id="patientForm">

    <div class="row">

        <!-- Patient Name -->
        <div class="col-md-4 mb-3">
            <label class="form-label">Patient Name</label>
            <input type="text"
                   class="form-control"
                   name="name"
                   required>
        </div>

        <!-- Age -->
        <div class="col-md-2 mb-3">
            <label class="form-label">Age</label>
            <input type="number"
                   class="form-control"
                   name="age"
                   min="0"
                   required>
        </div>

        <!-- Gender -->
        <div class="col-md-2 mb-3">
            <label class="form-label">Gender</label>

            <select class="form-select"
                    name="gender"
                    required>

                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>

            </select>

        </div>

        <!-- Mobile -->
        <div class="col-md-4 mb-3">

            <label class="form-label">Mobile Number</label>

            <input type="text"
                   class="form-control"
                   name="mobile"
                   maxlength="10"
                   required>

        </div>

    </div>


   
    <div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Doctor
        </label>

        <select
    name="doctor_id"
    id="doctorSelect"
    class="form-control"
    required>

    <option value="">Select Doctor</option>

    {% for doctor in doctors %}
        <option value="{{ doctor[0] }}">
            {{ doctor[1] }}
        </option>
    {% endfor %}

</select>

    </div>

    <div class="col-md-6 mb-3">

        <input
            type="hidden"
            name="patient_id"
            value="{{ patient_id }}">

    </div>

</div>

   

        

    <div class="mb-4">

        <label class="form-label">Address</label>

        <textarea class="form-control"
                  rows="3"
                  name="address"></textarea>

    </div>

<div class="card shadow-sm mb-4">

    <div class="card-header">

        <h5 class="mb-0">
            Test Selection
        </h5>

    </div>

    <div class="card-body">

        <div class="row">

            <!-- Available Tests -->

            <div class="col-lg-6">

                <label class="form-label fw-bold">

                    Search Test

                </label>

                <input
    type="text"
    id="searchTest"
    class="form-control"
    placeholder="Search Test...">

                <div id="testList"
                     class="test-list">

                    {% for test in tests %}

                    <div class="test-item">

                        <div>

                            <h6>{{ test[1] }}</h6>

                            <small>

                                ₹{{ test[2] }}

                            </small>

                        </div>

                        <button
    type="button"
    class="btn btn-primary btn-sm"
    onclick="addTest('{{ test[1] }}', {{ test[2] }})">

    Add

</button>

                    </div>

                    {% endfor %}

                </div>

            </div>
            <div class="col-lg-5">

    <div class="card shadow-sm h-100">

        <div class="card-header bg-success text-white">

            <h5 class="mb-0">
                Selected Tests
            </h5>

        </div>

        <div class="card-body">

    <div id="selectedTests">

        <p class="text-muted">
            No tests selected.
        </p>

    </div>

</div>

            <div id="hiddenInputs"></div>

        </div>

    </div>

</div>
<!-- Payment Details -->

<div class="card shadow-sm mt-4">

    <div class="card-header bg-primary text-white">

        <h4 class="mb-0">
            Payment Details
        </h4>

    </div>

    <div class="card-body">

        <div class="row g-3">

            <!-- Total -->

            <div class="col-md-3">

                <label class="form-label">
                    Total Amount
                </label>

                <input
                    type="number"
                    class="form-control"
                    id="total_amount"
                    name="total_amount"
                    value="0"
                    readonly>

            </div>

            <!-- Paid -->

            <div class="col-md-3">

                <label class="form-label">
                    Paid Amount
                </label>

                <input
                    type="number"
                    class="form-control"
                    id="paid_amount"
                    name="paid_amount"
                    value="0">

            </div>

            <!-- Remaining -->

            <div class="col-md-3">

                <label class="form-label">
                    Remaining Amount
                </label>

                <input
                    type="number"
                    class="form-control"
                    id="remaining_amount"
                    name="remaining_amount"
                    value="0"
                    readonly>

            </div>

            <!-- Status -->

            <div class="col-md-3">

                <label class="form-label">
                    Payment Status
                </label>

                <input
                    type="text"
                    class="form-control"
                    id="payment_status"
                    name="payment_status"
                    value="Pending"
                    readonly>

            </div>

            <!-- Payment Mode -->

            <div class="col-md-4">

                <label class="form-label">
                    Payment Mode
                </label>

                <select
                    class="form-select"
                    id="payment_mode"
                    name="payment_mode">

                    <option value="Cash">Cash</option>
                    <option value="UPI">UPI</option>
                    <option value="Card">Card</option>
                    <option value="Mixed">Mixed</option>

                </select>

            </div>

        </div>

    </div>

</div>

<div class="text-end mt-4">

    <button
        type="submit"
        class="btn btn-success btn-lg px-5">

        Register Patient

    </button>

    <button
        type="reset"
        class="btn btn-secondary btn-lg ms-2">

        Reset

    </button>

</div>

</form>
<script src="{{ url_for('static', filename='js/patient_registration.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script>

new Choices('#doctorSelect', {

    searchEnabled: true,
    itemSelectText: '',
    shouldSort: false,
    searchPlaceholderValue: 'Search Doctor...',
    placeholder: true

});

</script>
</body>
</html>
