<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Successful</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
     <link rel="stylesheet"
      href="{{ url_for('static', filename='css/registration_success.css') }}">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

   <div class="success-card">

    <div class="success-icon">
        ✓
    </div>

    <h2>Registration Successful</h2>

    <p class="subtitle">
        Your laboratory has been registered successfully.
    </p>

    <div class="lab-box">
        <h5>Your Laboratory ID</h5>
        <div class="lab-id">{{ lab_id }}</div>
    </div>

    <div class="username-box">
        <strong>Admin Username:</strong> {{ username }}
    </div>

    <div class="note">
        <strong>Important:</strong><br>
        Please save your <strong>Laboratory ID</strong>. It is required to identify your laboratory and will be used for future support and system management.
    </div>

    <a href="{{ url_for('login') }}" class="btn-login">
        Go to Login
    </a>

</div>

</div>

</body>

</html>
