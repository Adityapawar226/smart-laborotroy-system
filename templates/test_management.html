<!DOCTYPE html>
<html>

<head>

    <title>Test Management</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            margin:0;
            padding:30px;
        }

        .container{
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px lightgray;
        }

        h2{
            margin-top:0;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
        }

        .search-box input{
            padding:8px;
            width:250px;
        }

        .add-btn{
            background:#007bff;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            text-decoration:none;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#007bff;
            color:white;
        }

        th,td{
            padding:12px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f8f8f8;
        }

        .edit{
            background:orange;
            color:white;
            padding:6px 12px;
            text-decoration:none;
            border-radius:5px;
        }

        .delete{
            background:red;
            color:white;
            padding:6px 12px;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Test Management</h2>

<div class="top-bar">

<div class="search-box">

<input
    type="text"
    id="searchBox"
    class="form-control"
    placeholder="Search Test..."
>
</div>

<a href="/add-test" class="add-btn">

+ Add Test

</a>

</div>

<table>

<thead>
<tr>

<th>ID</th>
<th>Test Name</th>
<th>Category</th>
<th>Price</th>
<th>Sample Type</th>
<th>Report Time</th>
<th>Status</th>
<th>Action</th>

</tr>
</thead>

<tbody id="testTable">

{% for test in tests %}

<tr>

<td>{{ test[0] }}</td>
<td>{{ test[1] }}</td>
<td>{{ test[4] }}</td>
<td>₹{{ test[2] }}</td>
<td>{{ test[5] }}</td>
<td>{{ test[6] }}</td>
<td>{{ test[7] }}</td>

<td>

<a href="{{ url_for('edit_test', test_id=test[0]) }}"
class="edit">
Edit
</a>

<a href="{{ url_for('manage_parameters', test_id=test[0]) }}"
class="edit"
style="background:green;">
Parameters
</a>

<a href="{{ url_for('delete_test', test_id=test[0]) }}"
class="delete"
onclick="return confirm('Delete this test?');">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>
<script>

const searchBox = document.getElementById("searchBox");

searchBox.addEventListener("keyup", function () {

    let value = this.value.toLowerCase();

    let rows = document.querySelectorAll("#testTable tr");

    rows.forEach(function(row){

        let text = row.innerText.toLowerCase();

        if(text.includes(value))
        {
            row.style.display = "";
        }
        else
        {
            row.style.display = "none";
        }

    });

});

</script>

</body>

</html>
